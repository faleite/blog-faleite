baseURL: "https://blog.faleite.xyz/"
languageCode: pt-BR
title: faleite
theme: hextra

menu:
  main:
    - name: About
      url: "https://www.faleite.xyz/"
      weight: 1
      params:
        type: link
    - name: Theme
      identifier: theme-toggle
      weight: 2
      params:
        type: theme-toggle
        label: false
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/faleite"
      params:
        icon: github

# redirects:
#   - from: /
#     to: /blog
#     status: 301

# params:
#   page:
#     width: wide # full wide normal
params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/blogger.png
      #dark: images/logo-dark.svg
      link: /blog
      width: 25
      height: 25
  
  comments:
    enable: true
    type: zoomment
    zoomment:
      theme: light # black light dark
      language: pt-BR
      gravatar: monsterid # retro monsterid
      emotions: "❤️,😀,🪄,🥸,💡,🤔,💩,😢"
      visitors: true

