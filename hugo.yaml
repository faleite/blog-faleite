baseURL: "https://blog.faleite.xyz/"
languageCode: pt-BR
title: faleite.xyz
theme: hextra

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
      params:
        type: link
        icon: rss
    - name: Theme
      identifier: theme-toggle
      weight: 2
      params:
        type: theme-toggle
        label: false
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/faleite"
      params:
        icon: github

